name: Build and test StringCalculator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore StringCalculator.sln

      - name: Build
        run: dotnet build StringCalculator.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test StringCalculator.sln --configuration Release --no-build --verbosity normal